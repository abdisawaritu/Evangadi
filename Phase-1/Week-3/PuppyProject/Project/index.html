<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puppy Lovers Page</title>
    <link rel="stylesheet" href="./CSS/style.css" />
  </head>
  <body>
    <!-- header part starts  -->
    <header class="blueBG myHeader">
      <div class="puppylovers">
        <h1>Puppy Lovers Page</h1>
      </div>
    </header>
    <!-- header  section ends  -->

    <!-- first section parts starts  -->
    <section id="banners" class="banner">
      <img
        src="./images/banner-puppies.jpg"
        alt="banner image does not exist"
      />
    </section>
    <!-- section one ends  -->

    <!-- section two starts  -->
    <section class="three-puppies">
      <div class="puppyOne">
        <img src="./images/puppy-1.jpg" alt="puppy one image does not exist" />
      </div>
      <div class="missing-puppy missing-wrapper">
        <div class="missing-wrappers" >
          <p>Puppy missing here!!</p>
        </div>
      </div>
      <div class="puppyTwo">
        <img src="./images/puppy-2.jpg" alt="puppy two does not exits " />
      </div>
    </section>
    <!-- section two ends  -->

    <!-- section three starts -->
    <section class="more-puppies">
      <div class="fixed-contanier">
        <h2   id="more-text">More Puppies</h2>
        <div class="two-more-puppies">
          <div>
            <img src="./images/puppy-3.jpg" alt="" />
          </div>
          <div>
            <img src="./images/puppy-4.jpg" alt="" />
          </div>
        </div>
      </div>
    </section>
    <!-- section three ends  -->
    <!-- footer section  begin  -->

    <footer class="blueBG footer-part">
      <!-- <div class="footer-part">
        <h2>Developed by: Abdisa Waritu</h2>
      </div> -->
      <p>Developed by: Abdisa Waritu</p>
    </footer>
  </body>
</html>
