<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puppy Lovers page</title>
    <!-- bootstrap css only -->
    <link rel="stylesheet" href="./CSS/bootstrap.css" />
    <!-- custom css {}  to override the custom css we need to give the the high prioriy to the custom css styles  -->
    <link rel="stylesheet" href="./CSS/styles.css" />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- google free fonts  -->
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- header section starts   -->
    <header class="contanier-fluid text-center blueBG text-white py-4">
      <h1 class="h1 fw-bold">Puppy Lovers Page</h1>
    </header>

    <!-- header section ends  -->
    <!-- main content section -->

    <!-- section one starts  -->
    <section class="mb-5">
      <img src="./images/banner-puppies.jpg" alt="banner puppy image" />
    </section>
    <!-- section one ends  -->
    <!-- section two starts -->
    <section class="container">
      <div class="row">
        <div class="col-md-4">
          <div class="mb-5 mb-md-0">
            <img src="./images/puppy-1.jpg" alt=" puppy one image " />
          </div>
        </div>
        <div class="col-md-4 missing-puppies">
          <div class="d-none d-md-block">
            <p class=" fw-bold text-center display-5 p-4 p-lg-5">Puppy missing here!!</p>
          </div>
        </div>
        <div class="col-md-4">
          <div>
            <img src="./images/puppy-2.jpg" alt=" second puppy " />
          </div>
        </div>
      </div>
    </section>

    <!-- section three starts  -->
    <section class="text-center my-5">
      <h2 class="fw-bold">More Puppies</h2>
    </section>
    <!-- section four -->
    <section class="container">
      <div class="row" d-md-flex g-2>
        <div class="col-md-6">
          <div class="mb-5 mb-md-0">
            <img src="./images/puppy-3.jpg" alt="" />
          </div>
        </div>
        <div class="col-md-6">
          <div>
            <img src="./images/puppy-4.jpg" alt="" />
          </div>
        </div>
      </div>
    </section>

    <!-- footer section  -->
    <footer class="text-center blueBG py-5 mt-5">
      <h2 class="h2 text-white">Developed by:Abdisa</h2>
    </footer>
  </body>
</html>
