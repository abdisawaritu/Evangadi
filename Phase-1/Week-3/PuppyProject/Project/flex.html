<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flex examples</title>
    <link rel="stylesheet" href="./CSS/demo.css" />
    <style>
      .Parent { 
        border: 2px  solid   blue;
        padding: 100px;
        margin: 100px;
        background:  cyan;
        display: flex;
        justify-content: start;
        align-items:center ;
        height: 200px;;
        justify-content: space-around;





      }
      .box{
        width: 80px;
        height: 80px;
        background-color: blue;
        border: 2px  solid red;
        margin: 5px;
        padding: 5px;
      }
    </style>
  </head>
  <body>
    <div class="Parent">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
  </body>
</html>
