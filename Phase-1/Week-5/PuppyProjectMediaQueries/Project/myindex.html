<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Puppy lovers page with media query</title>
    <link rel="stylesheet" href="./CSS/mystyle.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- header section starts  -->
    <header class="blue-background header-part">
      <div class="puppy-lovers">
        <h1>Puppy Lovers Page</h1>
      </div>
    </header>
    <!-- header section ends  -->

    <!-- section one starts  -->
    <section>
      <div class="banner">
        <img
          src="./images/banner-puppies.jpg"
          alt="puppy image does not exist"
        />
      </div>
    </section>
    <!-- section one ends  -->

    <!-- section two starts  -->
    <section class="three-puppies common-puppies">
      <div class="puppyone">
        <img src="./images/puppy-1.jpg" alt="puppy image does not exist" />
      </div>
      <div class="missing-puppies">
        <p>Puppy missing here!!</p>
      </div>
      <div class="puppy-two">
        <img src="./images/puppy-2.jpg" alt="puppy image does not exist" />
      </div>
    </section>
    <!-- section two  ends  -->

    <!-- section three starts -->
    <section class="more-puppies">
      <div>
        <h2>More puppies</h2>
      </div>
    </section>
    <!-- section three ends  -->

    <!-- section four starts  -->
    <section class="two-more-puppies common-puppies">
      <div class="puppy-three">
        <img src="./images/puppy-3.jpg" alt="puppy image does not exist" />
      </div>
      <div class="puppy-four">
        <img src="./images/puppy-4.jpg" alt="puppy image does not exist" />
      </div>
    </section>
    <!-- section four ends  -->

    <!-- footer  section starts  -->

    <footer class="blue-background footer-parts">
      <div>
        <h2>Developed by:Abdisa</h2>
      </div>
    </footer>
    <!-- footer section ends  -->
  </body>
</html>
